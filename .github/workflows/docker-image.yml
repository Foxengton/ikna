name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: cd server && docker build -t ghcr.io/foxengton/ikna-backend:latest .

      - name: Push Docker image
        run: docker push ghcr.io/foxengton/ikna-backend:latest

      - name: Build Docker image
        run: cd .. && cd client && docker build -t ghcr.io/foxengton/ikna-client:latest .

      - name: Push Docker image
        run: docker push ghcr.io/foxengton/ikna-client:latest
