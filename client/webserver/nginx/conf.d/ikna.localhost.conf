server {
  listen 80;
  listen [::]:80;
  server_name ikna.localhost;

  # Разрешить доступ к .well-known для Let's Encrypt
  location /.well-known/acme-challenge/ {
    root /usr/share/nginx/ikna.localhost;
  }

  # Перенаправление всех остальных запросов на HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name ikna.localhost;
  root /usr/share/nginx/ikna.localhost;
  autoindex off;
  index index.html;

  ssl_certificate /etc/letsencrypt/ikna.localhost.crt;
  ssl_certificate_key /etc/letsencrypt/ikna.localhost.key;

  # Настройки SSL
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1h;
  keepalive_timeout 70;

  # HSTS (HTTP Strict Transport Security)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Disable MIME sniffing
  add_header X-Content-Type-Options 'nosniff' always;

  # Force www.site.com => site.com
  if ($host ~* ^www\.(.+)$) {
    return 301 $scheme://$1$request_uri;
  }

  # Disable access to hidden files/folders
  location ~* /\.(?!well-known/) {
    deny all;
    log_not_found off;
    access_log off;
  }

  # Disable access to backup/config/command/log files
  location ~* (?:\.(?:bak|co?nf(ig)?|in[ci]|log|sh|sql|tar|t?gz)|~)$ {
    deny all;
  }

  location ~* ^.+\.(?:css(\.map)?|js(\.map)?|jpe?g|png|gif|ico|cur|heic|webp|tiff?|mp3|m4a|aac|ogg|midi?|wav|mp4|mov|webm|mpe?g|avi|ogv|flv|wmv|svgz?|ttf|ttc|otf|eot|woff2?)$ {
    expires 1d;
    access_log off;
  }

  location / {
    # Force index.html routing (if not found)
    try_files $uri $uri/ /index.html?$query_string;

    # Force index.html routing (all requests)
    # rewrite ^/(.*)$ /index.html?/$1 last;

    root /usr/share/nginx/ikna.localhost;
    autoindex off;
    index index.html;
  }

  location /api {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}